
services:
  # PostgreSQL Database
  postgres:
    image: postgres:latest
    container_name: postgres-container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql  # ✅ New path for PostgreSQL 18+
    ports:
      - "5432:5432"
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Keycloak (creates its own database)
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak-container
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_DB_SCHEMA: public
    ports:
      - "8080:8080"
    command: ["start-dev"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - my-network

  # Lumen API (Backend)
  lumen-api:
    image: lumen-api:latest
    container_name: lumen-api-container
    build:
      context: ./lumen-backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME_IDENTITY: identity
      DB_NAME_LEARNING: learningresources
      AUTH_PROVIDER: keycloak
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: lumen-realm
      KEYCLOAK_CLIENT_ID: lumen-api
      KEYCLOAK_CLIENT_SECRET: your-client-secret
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - my-network

  # Svelte Frontend
  lumen-frontend:
    image: lumen-frontend:latest
    container_name: lumen-frontend-container
    build:
      context: ./lumen-frontend/lumen-frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://lumen-api:8080
      VITE_KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "3000:3000"
    depends_on:
      - lumen-api
    networks:
      - my-network

volumes:
  postgres_data:

networks:
  my-network:
    driver: bridge